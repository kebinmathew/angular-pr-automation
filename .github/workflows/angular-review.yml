name: Angular PR Review

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Install reviewdog
        run: |
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s

      - name: Run ESLint
        run: |
          npx eslint "src/**/*.{ts,html}" -f checkstyle -o eslint-result.xml || true

      - name: Ensure result file
        run: |
          if [ ! -f eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

      - name: Reviewdog
        run: |
          cat eslint-result.xml | ./bin/reviewdog \
            -f=checkstyle \
            -name="angular-review" \
            -reporter=github-pr-review \
            -level=warning
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}