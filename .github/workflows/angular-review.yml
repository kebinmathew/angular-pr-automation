name: Angular PR Review

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # ------------------------------------------------
      # Checkout
      # ------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------
      # Setup Node
      # ------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ------------------------------------------------
      # Install Project Dependencies
      # ------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------
      # Setup Reviewdog
      # ------------------------------------------------
      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1

      # ============================================================
      # ESLINT (TS + HTML)
      # ============================================================

      - name: Install ESLint formatter
        run: npm install eslint-formatter-checkstyle --save-dev

      - name: Run ESLint and comment PR
        run: |
          npx eslint "src/**/*.{ts,html}" \
            -f checkstyle \
            -o eslint-result.xml || true

          if [ ! -s eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

          reviewdog -f=checkstyle \
            -name="angular-eslint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < eslint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # STYLELINT (CSS + SCSS)
      # ============================================================

      - name: Install Stylelint
        run: |
          npm install stylelint stylelint-config-standard stylelint-scss --save-dev

      - name: Run Stylelint and comment PR
        run: |
          npx stylelint "src/**/*.{css,scss}" \
            --formatter unix \
            || true \
          | reviewdog \
              -f=stylelint \
              -name="angular-stylelint-review" \
              -reporter=github-pr-review \
              -level=warning
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
