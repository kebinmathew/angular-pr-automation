name: Angular PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.ts'
      - '**/*.html'
      - '**/*.css'
      - '**/*.scss'

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      # Install project dependencies
      - name: Install dependencies
        run: npm ci

      # Install reviewdog
      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1

      # =====================================================
      # ESLINT (TS + HTML)
      # =====================================================

      - name: Install ESLint Checkstyle Formatter
        run: npm install eslint-formatter-checkstyle --save-dev

      - name: Run ESLint
        run: |
          npx eslint . \
            -f checkstyle \
            -o eslint-result.xml || true

      - name: Ensure ESLint result file exists
        run: |
          if [ ! -s eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

      - name: Reviewdog ESLint
        run: |
          reviewdog -f=checkstyle \
            -name="angular-eslint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < eslint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # STYLELINT (CSS + SCSS)
      # =====================================================

      - name: Install Stylelint
        run: |
          npm install stylelint stylelint-config-standard stylelint-scss --save-dev

      - name: Run Stylelint
        run: |
          npx stylelint "**/*.{css,scss}" \
            --formatter json \
            > stylelint-result.json || true

      - name: Ensure Stylelint result file exists
        run: |
          if [ ! -s stylelint-result.json ]; then
            echo "[]" > stylelint-result.json
          fi

      - name: Reviewdog Stylelint
        run: |
          reviewdog -f=stylelint \
            -name="angular-stylelint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < stylelint-result.json
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
