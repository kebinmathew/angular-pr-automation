name: Angular PR Review

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # install deps
      - run: npm ci

      # install reviewdog
      - uses: reviewdog/action-setup@v1

      # 🔴 IMPORTANT: install checkstyle formatter
      - name: Install formatter
        run: npm install eslint-formatter-checkstyle --save-dev

      # run eslint
      - name: Run ESLint
        run: |
          npx eslint . \
          -f checkstyle \
          -o eslint-result.xml || true

      # ensure file exists
      - name: Ensure result file
        run: |
          if [ ! -s eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

      # reviewdog comment
      - name: Reviewdog
        run: |
          reviewdog -f=checkstyle \
            -name="angular-review" \
            -reporter=github-pr-review \
            -level=warning \
            < eslint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------
      # STYLELINT (CSS + SCSS)
      # ---------------------------
      - name: Run Stylelint with Reviewdog
        uses: reviewdog/action-stylelint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          stylelint_flags: '"**/*.{css,scss}"'

  
