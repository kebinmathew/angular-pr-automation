name: Angular PR Review

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # -----------------------------------------
      # Checkout code
      # -----------------------------------------
      - uses: actions/checkout@v4

      # -----------------------------------------
      # Setup Node (Stylelint requires Node 20+)
      # -----------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # -----------------------------------------
      # Install project dependencies
      # -----------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------
      # Setup reviewdog
      # -----------------------------------------
      - uses: reviewdog/action-setup@v1

      # -----------------------------------------
      # Install ESLint checkstyle formatter
      # -----------------------------------------
      - name: Install ESLint formatter
        run: npm install eslint-formatter-checkstyle --save-dev

      # =====================================================
      # ESLINT (TypeScript + Angular HTML)
      # =====================================================

      - name: Run ESLint
        run: |
          npx eslint "src/**/*.{ts,html}" \
            -f checkstyle \
            -o eslint-result.xml || true

          # Ensure file exists
          if [ ! -s eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

      - name: Reviewdog ESLint
        run: |
          reviewdog -f=checkstyle \
            -name="angular-eslint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < eslint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # STYLELINT (CSS + SCSS)
      # =====================================================

      - name: Install Stylelint
        run: npm install stylelint stylelint-config-standard stylelint-scss --save-dev

      - name: Run Stylelint
        run: |
          npx stylelint "src/**/*.{css,scss}" \
            --formatter checkstyle \
            --output-file stylelint-result.xml || true

          # Ensure file exists
          if [ ! -s stylelint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > stylelint-result.xml
          fi

      - name: Reviewdog Stylelint
        run: |
          reviewdog -f=checkstyle \
            -name="angular-stylelint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < stylelint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
