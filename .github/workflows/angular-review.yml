name: Angular PR Review

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Install ESLint checkstyle formatter
        run: npm install -D eslint-formatter-checkstyle

      - name: Install reviewdog
        run: |
          mkdir -p bin
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -b ./bin

      # Run ESLint
      - name: Run ESLint
        run: |
          npx eslint $(find src -name "*.ts" -o -name "*.html") -f checkstyle -o eslint-result.xml || true

          if [ ! -f eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

      # Send to PR
      - name: Reviewdog
        run: |
          reviewdog -f=checkstyle \
            -name="angular-review" \
            -reporter=github-check \
            -level=warning
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
