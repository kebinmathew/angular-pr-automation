name: Angular PR Review

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # -----------------------------------------
      # Checkout
      # -----------------------------------------
      - uses: actions/checkout@v4

      # -----------------------------------------
      # Setup Node 20 (required for Stylelint)
      # -----------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # -----------------------------------------
      # Install project dependencies
      # -----------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------
      # Setup reviewdog
      # -----------------------------------------
      - uses: reviewdog/action-setup@v1

      # =====================================================
      # ESLINT (TS + HTML)
      # =====================================================

      - name: Install ESLint formatter
        run: npm install eslint-formatter-checkstyle --save-dev

      - name: Run ESLint
        run: |
          npx eslint "src/**/*.{ts,html}" \
            -f checkstyle \
            -o eslint-result.xml || true

          if [ ! -s eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle></checkstyle>' > eslint-result.xml
          fi

      - name: Reviewdog ESLint
        run: |
          reviewdog -f=checkstyle \
            -name="angular-eslint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < eslint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # STYLELINT (CSS + SCSS) - Modern Version
      # =====================================================

      - name: Install Stylelint
        run: npm install stylelint stylelint-config-standard stylelint-scss --save-dev

      - name: Run Stylelint
        run: |
          npx stylelint "src/**/*.{css,scss}" \
            --formatter json \
            > stylelint-result.json || true

          if [ ! -s stylelint-result.json ]; then
            echo "[]" > stylelint-result.json
          fi

      - name: Convert Stylelint JSON to RDJSON
        run: |
          npx reviewdog -f=stylelint \
            -name="angular-stylelint-review" \
            -reporter=github-pr-review \
            -level=warning \
            < stylelint-result.json
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
