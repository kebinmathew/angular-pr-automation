name: Angular Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: reviewdog/action-setup@v1

      - name: Install dependencies
        run: npm ci

      # Install ESLint formatter for checkstyle XML
      - name: Install ESLint formatter
        run: npm install eslint-formatter-checkstyle --save-dev

      - name: Run ESLint
        run: |
          npx eslint "src/**/*.{ts,html}" \
            -f checkstyle \
            -o eslint-result.xml || true

          # Ensure file exists (like your Java workflow)
          if [ ! -s eslint-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle version="1.0"></checkstyle>' > eslint-result.xml
          fi

      - name: Reviewdog
        run: |
          reviewdog -f=checkstyle \
            -name="angular-review" \
            -reporter=github-pr-review \
            -level=warning \
            < eslint-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
